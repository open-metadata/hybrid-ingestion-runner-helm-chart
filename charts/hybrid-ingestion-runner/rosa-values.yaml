---

replicaCount: 1

image:
  repository: "118146679784.dkr.ecr.eu-west-1.amazonaws.com/hybrid-ingestion-runner"
  tag: "1.11.10"
  pullPolicy: IfNotPresent

# Reference the ECR secret created manually via AWS CLI
imagePullSecrets:
  - name: omd-registry-credentials

# Additional environment variables for the hybrid runner container
extraEnvs: []
# Additional envFrom entries for the hybrid runner container
envFrom: []

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 8585
  metricsPort: 8989

config:
  # Runner identifier assigned to ingestion pipelines in Collate
  agentId: "RemoteRunner"

  # Collate auth token — fill this in or use authTokenSecret below
  authToken: ""
  # authTokenSecret:
  #   name: "my-collate-token-secret"
  #   key: "token"

  # Your Collate cluster hostname (without protocol)
  serverHost: "my-cluster.getcollate.io"
  useSecureProtocols: true

  secretsManager: "kubernetes"

  ingestionPods:
    repository: "118146679784.dkr.ecr.eu-west-1.amazonaws.com/collate-customers-ingestion-slim-eu-west-1"
    tag: "om-1.11.10-cl-1.11.10"
    # Must match the secret name created by the AWS CLI commands below
    imagePullSecrets: "omd-registry-credentials"
    serviceAccount:
      create: true
      name: "ingestion"
      automount: true
    resources:
      limits:
        cpu: "1000m"
        memory: "4096Mi"
      requests:
        cpu: "1000m"
        memory: "4096Mi"
    automationResources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "200m"
        memory: "256Mi"

  argoWorkflows:
    endpoint: ""

# Tells the chart to apply OpenShift/ROSA-compatible security contexts.
# Omits runAsUser, fsGroup, and seccompProfile — OpenShift assigns a UID
# from its allowed range [1000610000, 1000619999] automatically.
openshift:
  enabled: true

ecrRegistryHelper:
  enabled: false

# Disable Argo Workflows unless you are running your own instance
installArgoWorkflows: false
createArgoWorkflowsNamespace: false

serviceMonitor:
  enabled: false
  interval: 30s

prometheusRules:
  enabled: false

grafanaDashboard:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
